# Builds web/ (metrics → charts) and deploys to GitHub Pages.
# Enable: Repo Settings → Pages → Source: GitHub Actions.
name: Deploy results site

on:
  push:
    branches: [main, phase1-graph]
    paths:
      - "web/**"
      - "scripts/build_results_site.py"
      - "runs/**"
      - ".github/workflows/deploy-results-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Aggregate metrics into web/
        run: python scripts/build_results_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
