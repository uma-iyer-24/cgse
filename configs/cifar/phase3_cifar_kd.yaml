# Teacher + KD, fixed architecture (no mutation).
# SEArch-style *control* condition: external teacher soft targets only — compare to
# baseline_sear_ch_teacher_mutate.yaml (teacher + KD + mutate) and future CGSE (critic, no teacher).
#
# Prerequisite: checkpoints/tier1/cgse_phase2_cifar_full.pt from phase2_cifar_full run.
experiment:
  name: cgse_phase3_cifar_kd

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/tier1/metrics/phase3_cifar_kd_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: mps

# Frozen teacher: must match student class (CifarGraphNet) and num_classes.
teacher:
  enabled: true
  checkpoint: checkpoints/tier1/cgse_phase2_cifar_full.pt
  temperature: 4.0
  alpha: 0.5

mutation:
  enabled: false
  once_after_epoch: 10
  widen_delta: 32
  log_jsonl: runs/tier1/mutations/phase3_cifar_kd_mutations.jsonl