# Quick KD smoke: small subset, few epochs. Requires teacher checkpoint on disk.
experiment:
  name: cgse_phase3_cifar_kd_smoke

data:
  name: cifar10
  root: ./data
  num_workers: 0
  subset_train: 512
  subset_test: 256

training:
  epochs: 3
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/smoke/metrics/phase3_cifar_kd_smoke_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: cpu

teacher:
  enabled: true
  checkpoint: checkpoints/tier1/cgse_phase2_cifar_full.pt
  temperature: 4.0
  alpha: 0.5

mutation:
  enabled: false
