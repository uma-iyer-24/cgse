# Fast smoke test (small subset, few epochs)
experiment:
  name: cgse_phase2_smoke

data:
  name: cifar10
  root: ./data
  num_workers: 0
  subset_train: 512
  subset_test: 256

training:
  epochs: 2
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0005
  seed: 0
  log_csv: runs/smoke/metrics/phase2_smoke_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: cpu

mutation:
  enabled: false
  once_after_epoch: 0
  widen_delta: 16
