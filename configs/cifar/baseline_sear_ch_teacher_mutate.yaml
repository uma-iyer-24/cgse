# SEArch-style *control* baseline for comparison with CGSE:
# frozen teacher (KD) + same structural mutation schedule as phase2 full mutate.
#
# Prerequisite: checkpoints/tier1/cgse_phase2_cifar_full.pt (or symlink checkpoints/cgse_phase2_cifar_full.pt).
#
# CGSE mirror: configs/cifar/phase2_cifar_full_cgse.yaml — same student/mutation budget style,
# critic.enabled instead of teacher + schedule/once_after (when critic gates timing).
experiment:
  name: baseline_sear_ch_teacher_mutate

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/tier1/metrics/baseline_sear_ch_teacher_mutate_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: mps

teacher:
  enabled: true
  checkpoint: checkpoints/tier1/cgse_phase2_cifar_full.pt
  temperature: 4.0
  alpha: 0.5

mutation:
  enabled: true
  once_after_epoch: 10
  widen_delta: 32
  log_jsonl: runs/tier1/mutations/baseline_sear_ch_teacher_mutate_mutations.jsonl