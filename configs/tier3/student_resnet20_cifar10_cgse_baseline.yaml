# Tier 3 — CGSE + baseline (probe OFF, baseline ON). Ablation row 2 of 4.
#
# Role in paper: isolates the contribution of the EMA-baseline-subtracted
# REINFORCE update (Eq. 23) from CGSE base. Probe is still off, so any
# improvement over CGSE base is attributable purely to gradient-variance
# reduction, not to the locality signal.
#
# epochs_per_stage = 8 matches SEArch and the other CGSE arms.
experiment:
  name: tier3_student_resnet20_cifar10_cgse_baseline

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: none
  log_csv: runs_paper/tier3/metrics/tier3_student_resnet20_cgse_baseline_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: true
  log_jsonl: runs_paper/tier3/mutations/tier3_student_resnet20_cgse_baseline_mutations.jsonl

critic:
  enabled: false

searh:
  enabled: true
  selector: critic
  param_budget_factor: 1.5
  epochs_per_stage: 8        # MATCHED to SEArch
  B_op: 7
  deepen_first: true
  d_k: 64
  hidden_dim: 64
  critic_lr: 0.01
  critic_weight_decay: 0.0
  epsilon: 0.30
  entropy_beta: 0.01
  final_retrain_epochs: 10
  max_epochs_hint: 234

  # ----- Ablation toggles -----
  use_student_probe: false   # OFF
  baseline_momentum: 0.9     # ON: EMA baseline tracks recent rewards, advantage = R - baseline
