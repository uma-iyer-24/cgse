# Tier 3 — Student CE baseline (ResNet-20, plain cross-entropy, 50 epochs).
#
# Role in paper: floor for the headline table. "What does the student get
# without any KD and without any architectural search?" Compared against
# the SEArch / CGSE arms to isolate the *combined* contribution of
# (KD + structural growth) and then, via Student KD, to isolate KD alone
# from search alone.
experiment:
  name: tier3_student_resnet20_cifar10_ce

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: multistep
    milestones: [25, 40]
    gamma: 0.1
  log_csv: runs_paper/tier3/metrics/tier3_student_resnet20_ce_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: false

critic:
  enabled: false
