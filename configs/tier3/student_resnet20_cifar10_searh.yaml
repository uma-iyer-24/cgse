# Tier 3 — Paper-faithful SEArch (Liang, Xiang & Li 2025, Neurocomputing 651).
#
# The system the paper is trying to beat. Mechanism:
#   - Channel-space attention KD over (student stage, teacher stage) pairs (Eqs. 1-5)
#   - Modification value MV(n) = D(n) · deg+/deg- (Eq. 9) ranks per-stage bottleneck
#   - argmax-MV stage is split via deepen (sep-conv 3x3 inserted, Eq. 26) until B_op=7,
#     then widen (parallel sep-conv branch wrapping the last block, Eq. 27)
#   - Cosine-annealed lambda on the imitation loss (Eq. 8), final 10-ep retrain
#   - Loop terminates at param_budget_factor x initial_params (Eq. 29)
#
# epochs_per_stage = 8 matches the SEArch paper's stage cadence and is HELD
# IDENTICAL across all four CGSE arms in Tier 3 so the comparison isolates
# the MV signal, not the outer-loop schedule.
experiment:
  name: tier3_student_resnet20_cifar10_searh

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50              # informational; searh loop sets its own schedule
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: none            # searh loop runs constant LR; final retrain optional
  log_csv: runs_paper/tier3/metrics/tier3_student_resnet20_searh_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10
  teacher_depth: 56

device: auto

teacher:
  enabled: true
  checkpoint: checkpoints/tier3/tier3_teacher_resnet56_cifar10.pt
  depth: 56
  base_width: 16
  temperature: 4.0       # not used by searh attention KD; retained for compat
  alpha: 0.0             # logit KD off; only attention-imitation loss is used

mutation:
  enabled: true
  log_jsonl: runs_paper/tier3/mutations/tier3_student_resnet20_searh_mutations.jsonl

critic:
  enabled: false

searh:
  enabled: true
  selector: teacher
  param_budget_factor: 1.5
  epochs_per_stage: 8        # paper-faithful; matched by all CGSE Tier 3 arms
  B_op: 7
  deepen_first: true
  gamma: 0.5
  d_k: 64
  lambda_init: 1.0
  score_batches: 2
  final_retrain_epochs: 10
