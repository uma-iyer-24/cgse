# Smoke test with one widen after epoch 0
experiment:
  name: cgse_phase2_smoke_mutate

data:
  name: cifar10
  root: ./data
  num_workers: 0
  subset_train: 256
  subset_test: 128

training:
  epochs: 2
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0005
  seed: 1
  log_csv: runs/phase2_smoke_mutate_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: cpu

mutation:
  enabled: true
  once_after_epoch: 0
  widen_delta: 16
  log_jsonl: runs/phase2_smoke_mutate_mutations.jsonl
