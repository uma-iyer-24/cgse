# SEArch-style *control* baseline for comparison with CGSE:
# frozen teacher (KD) + same structural mutation schedule as phase2 full mutate.
#
# Prerequisite: checkpoints/cgse_phase2_cifar_full.pt (or another CifarGraphNet .pt).
#
# CGSE experiments will mirror this config but disable teacher and use a critic-driven
# mutation policy instead (once implemented in train.py).
experiment:
  name: baseline_sear_ch_teacher_mutate

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/baseline_sear_ch_teacher_mutate_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: mps

teacher:
  enabled: true
  checkpoint: checkpoints/cgse_phase2_cifar_full.pt
  temperature: 4.0
  alpha: 0.5

mutation:
  enabled: true
  once_after_epoch: 10
  widen_delta: 32
  log_jsonl: runs/baseline_sear_ch_teacher_mutate_mutations.jsonl
