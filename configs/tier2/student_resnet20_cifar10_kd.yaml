# Tier 2: student (ResNet-20) trained with frozen ResNet-56 teacher via logit KD.
experiment:
  name: tier2_student_resnet20_cifar10_kd

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 200
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: multistep
    milestones: [100, 150]
    gamma: 0.1
  log_csv: runs/tier2/metrics/tier2_student_resnet20_kd_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10
  teacher_depth: 56

device: auto

teacher:
  enabled: true
  # Update this after you train the teacher config above:
  checkpoint: checkpoints/tier2/tier2_teacher_resnet56_cifar10.pt
  depth: 56
  base_width: 16
  temperature: 4.0
  alpha: 0.5

mutation:
  enabled: false

critic:
  enabled: false

