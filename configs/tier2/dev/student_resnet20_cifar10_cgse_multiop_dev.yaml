# Tier 2 DEV: CGSE multi-op sanity check (small subset, few epochs).
experiment:
  name: tier2dev_student_resnet20_cifar10_cgse_multiop

data:
  name: cifar10
  root: ./data
  num_workers: 2
  subset_train: 4000
  subset_test: 1000

training:
  epochs: 6
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: multistep
    milestones: [4, 5]
    gamma: 0.1
  log_csv: runs/tier2/metrics/tier2dev_student_resnet20_cgse_multiop_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: true
  widen_delta: 32
  log_jsonl: runs/tier2/mutations/tier2dev_student_resnet20_cgse_multiop_mutations.jsonl

critic:
  enabled: true
  window_start_epoch: 2
  window_end_epoch: 2
  force_mutate_end_of_window: false
  epsilon: 0.25
  lr: 0.01
  hidden_dim: 64
  weight_decay: 0.0
  actions: [noop, resnet_head_widen, resnet_layer3_widen, resnet_insert_block]

