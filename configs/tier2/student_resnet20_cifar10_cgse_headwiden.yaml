# Tier 2: CGSE (teacher-free) — critic gates the same ResNet head widening.
experiment:
  name: tier2_student_resnet20_cifar10_cgse_headwiden

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: multistep
    milestones: [25, 40]
    gamma: 0.1
  log_csv: runs_paper/tier2/metrics/tier2_student_resnet20_cgse_headwiden_metrics.csv

model:
  name: resnet_cifar
  depth: 20
  base_width: 16
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: true
  op: resnet_head_widen
  widen_delta: 64
  log_jsonl: runs_paper/tier2/mutations/tier2_student_resnet20_cgse_headwiden_mutations.jsonl

critic:
  enabled: true
  # Parity with scheduled head widen: allow mutation only at epoch 100.
  window_start_epoch: 25
  window_end_epoch: 25
  force_mutate_end_of_window: true
  epsilon: 0.25
  lr: 0.01
  hidden_dim: 64
  weight_decay: 0.0

