# Tier 2: train a strong teacher (ResNet-56 on CIFAR-10).
experiment:
  name: tier2_teacher_resnet56_cifar10

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 200
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  seed: 42
  lr_schedule:
    name: multistep
    milestones: [100, 150]
    gamma: 0.1
  log_csv: runs/tier2/metrics/tier2_teacher_resnet56_metrics.csv

model:
  name: resnet_cifar
  depth: 56
  base_width: 16
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: false

critic:
  enabled: false

