# Full CIFAR-10 train + test (50k / 10k). Longer run for paper baseline curves.
experiment:
  name: cgse_phase2_cifar_full

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: paper_documentation/runs/phase2_cifar_full_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: mps

mutation:
  enabled: false
  once_after_epoch: 10
  widen_delta: 32
  # When enabled, one JSON line per mutation event (params before/after, layer id, etc.)
  log_jsonl: paper_documentation/runs/phase2_cifar_full_mutations.jsonl
