# Full CIFAR-10 (50k/10k), 50 epochs — same as phase2_cifar_full but with one widen mid-training.
# Compare CSV / curves against runs/phase2_cifar_full_metrics.csv (mutation off baseline).
experiment:
  name: cgse_phase2_cifar_full_mutate

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/phase2_cifar_full_mutate_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: mps

mutation:
  enabled: true
  # After finishing this epoch (0-based), widen first Linear (fc1) and refresh optimizer.
  once_after_epoch: 10
  widen_delta: 32
  log_jsonl: runs/phase2_cifar_full_mutate_mutations.jsonl
