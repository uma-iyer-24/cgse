# Tier 1b — full CIFAR-10, fixed schedule (SEArch-style control in our stack).
# 5 stages × 10 epochs = 50 total; matches phase2_cifar_full epoch budget.
# Ops: conv trunk widen → fc1 widen → split before fc2 (avoids multi-M-param fc1-split identity).
experiment:
  name: cgse_evolution_tier1b_schedule

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/tier1b/metrics/evolution_tier1b_schedule_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: false
  log_jsonl: runs/tier1b/mutations/evolution_tier1b_schedule_mutations.jsonl

evolution:
  enabled: true
  mode: schedule
  epochs_per_stage: 10
  num_stages: 5
  widen_fc_delta: 32
  widen_conv_delta: 32
  # Optional: stop if structure grows past budget (uncomment to enable)
  # max_parameters: 15000000
  schedule:
    - after_stage: 0
      op: widen_conv3
      conv_delta: 32
    - after_stage: 1
      op: widen_fc1
      widen_delta: 32
    - after_stage: 2
      op: split_before_fc2
