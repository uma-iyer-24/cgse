# Tier 1b — full CIFAR-10, discrete critic picks among legal ops after each stage.
# Same stage/epoch budget as evolution_tier1b_schedule.yaml for fair comparison.
experiment:
  name: cgse_evolution_tier1b_critic

data:
  name: cifar10
  root: ./data
  num_workers: 4
  subset_train: null
  subset_test: null

training:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0005
  seed: 42
  log_csv: runs/tier1b/metrics/evolution_tier1b_critic_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: auto

teacher:
  enabled: false

mutation:
  enabled: false
  log_jsonl: runs/tier1b/mutations/evolution_tier1b_critic_mutations.jsonl

evolution:
  enabled: true
  mode: critic
  epochs_per_stage: 10
  num_stages: 5
  widen_fc_delta: 32
  widen_conv_delta: 32
  candidates:
    - widen_conv3
    - widen_fc1
    - split_before_fc2
  critic:
    epsilon: 0.25
    lr: 0.01
    hidden_dim: 64
    weight_decay: 0.0
  schedule: []
