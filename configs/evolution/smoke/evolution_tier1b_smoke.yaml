# Tier 1b smoke: multi-stage + scheduled mutations (conv widen → fc widen → split).
# evolution.enabled → do not enable mutation.enabled or critic.enabled (Tier 1 path).
experiment:
  name: cgse_evolution_tier1b_smoke

data:
  name: cifar10
  root: ./data
  num_workers: 2
  subset_train: 1024
  subset_test: 256

training:
  epochs: 1
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0005
  seed: 0
  log_csv: runs/tier1b/metrics/evolution_tier1b_smoke_metrics.csv

model:
  name: cifar_cnn
  num_classes: 10

device: cpu

teacher:
  enabled: false

mutation:
  enabled: false
  log_jsonl: runs/tier1b/mutations/evolution_tier1b_smoke_mutations.jsonl

evolution:
  enabled: true
  mode: schedule
  epochs_per_stage: 2
  num_stages: 5
  widen_fc_delta: 16
  widen_conv_delta: 16
  schedule:
    - after_stage: 0
      op: widen_conv3
      conv_delta: 16
    - after_stage: 1
      op: widen_fc1
      widen_delta: 24
    - after_stage: 2
      op: split_before_fc1
